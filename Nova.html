<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kecomu · IA para Desarrollo Web • Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: rgb(46, 0, 8);
            margin: 0;
            padding: 20px;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            color: rgba(255, 255, 255, 0.766);
            min-height: 100vh;
        }

        @keyframes TarjetaAnimada {
            0% {
                opacity: 0;
                transform: translateY(40px) scale(0.95);
                filter: blur(8px);
                border: 1.025px solid rgba(255, 200, 200, 0.6);
                color: transparent;
            }
            40% {
                opacity: 0.6;
                background-color: rgba(125, 85, 85, 0.229);
                transform: translateY(-8px) scale(1.01);
                filter: blur(6px);
            }
            100% {
                opacity: 0.5;
                transform: translateY(0) scale(1);
                filter: blur(0.5px);
                background: rgba(255, 255, 255, 0.05);
                backdrop-filter: blur(10px);
                border: 1.6px solid rgba(255, 200, 200, 0.3);
                color: rgba(255, 255, 255, 0.522);
            }
        }

        @keyframes pt {
            0% {
                opacity: 0;
                transform: translateY(5px) scale(0.95);
                filter: blur(8px);
                border: 2.025px solid rgba(255, 200, 200, 0.6);
                color: transparent;
            }
            40% {
                opacity: 0.6;
                background-color: rgba(125, 85, 85, 0.229);
                transform: translateY(-3px) scale(1.02);
                filter: blur(6px);
            }
            100% {
                opacity: 0.5;
                transform: translateY(0) scale(1);
                filter: blur(0.5px);
                background: rgba(255, 255, 255, 0.05);
                backdrop-filter: blur(10px);
                border: 2.6px solid rgba(255, 200, 200, 0.3);
                color: rgb(255, 255, 255);
                border-color: rgba(7, 113, 78, 0.356);
                margin: 5px;
            }
        }

        @keyframes ptBaja {
            0% {
                opacity: 0;
                border: 2.025px solid rgba(255, 200, 200, 0.6);
                color: transparent;
            }
            40% {
                opacity: 0.6;
                background-color: rgba(125, 85, 85, 0.229);
            }
            100% {
                opacity: 1;
                background: rgba(255, 255, 255, 0.05);
                backdrop-filter: blur(10px);
                border: 2.6px solid rgba(255, 200, 200, 0.3);
                color: rgb(255, 255, 255);
                border-color: rgba(7, 113, 78, 0.356);
                margin: 5px;
            }
        }

        @keyframes ptIntermedia {
            0% {
                opacity: 0;
                transform: translateY(3px) scale(0.99);
                border: 2.025px solid rgba(255, 200, 200, 0.6);
                color: transparent;
            }
            40% {
                opacity: 0.6;
                background-color: rgba(125, 85, 85, 0.229);
                transform: translateY(-2px) scale(1.02);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
                background: rgba(255, 255, 255, 0.05);
                backdrop-filter: blur(10px);
                border: 2.6px solid rgba(255, 200, 200, 0.3);
                color: rgb(255, 255, 255);
                border-color: rgba(7, 113, 78, 0.356);
                margin: 5px;
            }
        }

        .tarjeta1,
        .tarjeta2,
        .tarjeta3,
        .tarjeta4 {
            animation: TarjetaAnimada 1.5s ease-in-out forwards;
            animation-fill-mode: both;
            border-radius: 12px;
        }

        .tarjeta1 {
            padding: 30px;
            margin-bottom: 20px;
            animation-delay: 0s;
        }

        .fila {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            margin-bottom: 20px;
        }

        .tarjeta-pequena {
            flex: 1;
            padding: 15px;
            text-align: center;
            font-size: 13px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .tarjeta-pequena:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.1);
        }

        .tarjeta-grande {
            flex: 1;
            padding: 20px;
            font-size: 12px;
            min-height: 200px;
        }

        .chat-container {
            flex: 1;
            padding: 20px;
            min-height: 500px;
            display: flex;
            flex-direction: column;
        }

        .mensajes-area {
            flex: 1;
            min-height: 400px;
            max-height: 400px;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .mensaje {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 12px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .mensaje-usuario {
            align-self: flex-end;
            background: rgba(100, 70, 140, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 200, 200, 0.3);
            color: white;
            animation: pt 0.8s ease-out forwards;
            animation-fill-mode: forwards
        }

        .mensaje-ia {
            align-self: flex-start;
            background: rgba(50, 35, 70, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 200, 200, 0.2);
            color: rgba(255, 255, 255, 0.9);
            border-color: blanchedalmond;
            animation-delay: 0.8s;
            animation: pt 1.3s ease-out forwards;
            animation-fill-mode: forwards
        }

        .input-area {
            display: flex;
            gap: 8px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 200, 200, 0.2);
        }

        .input-mensaje {
            flex: 1;
            background: rgba(255, 255, 255, 0.1);
            border: 0.5px solid rgba(255, 200, 200, 0.3);
            border-radius: 20px;
            padding: 10px 15px;
            color: white;
            font-family: inherit;
            font-size: 12px;
            resize: none;
            outline: none;
        }

        .input-mensaje:focus {
            border-color: rgba(255, 200, 200, 0.6);
        }

        .btn-enviar {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 200, 200, 0.3);
            border-radius: 20px;
            padding: 10px 20px;
            color: white;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-enviar:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(0.98);
        }

        .selector-version {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            justify-content: center;
        }

        .btn-version {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 200, 200, 0.2);
            border-radius: 15px;
            padding: 6px 15px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-version.activo {
            background: rgba(168, 75, 255, 0.3);
            border-color: rgba(168, 75, 255, 0.6);
            color: white;
        }

        .btn-version:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .f2-1 { animation-delay: 0s; }
        .f2-2 { animation-delay: 0.3s; }
        .f2-3 { animation-delay: 0.6s; }
        .f3-1 { animation-delay: 1s; }
        .f3-2 { animation-delay: 1s; }
        .f3-3 { animation-delay: 1s; }

        hr {
            border: 0.5px solid rgba(255, 200, 200, 0.2);
            margin: 10px 0;
        }
        .btn-config {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 200, 200, 0.3);
            border-radius: 1.5px;
            padding: 8px 20px;
            color: white;
            font-size: 10px;
            font-family: inherit;
            cursor: pointer;
            opacity: 0.5;
            backdrop-filter: blur(5px);
            transition: all 0.9s ease;
            animation: TarjetaAnimada 1.5s ease-in-out forwards;
            animation-fill-mode: both;
            animation-delay: 0.5s;
        }

        .btn-config:hover {
            background: rgb(60, 0, 9) !important;
            filter: blur(0.3px) !important;
            transform: scale(0.99) !important;
            opacity: 0.5 !important;
        }

        .contenedor-boton {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 20px;
        }

        .contenedor-boton-izq {
            display: flex;
            justify-content: flex-start;
            margin-bottom: 20px;
            gap: 10px;
        }

        @media (max-width: 768px) {
            .fila {
                flex-direction: column;
            }
            .tarjeta-grande {
                min-height: auto;
            }
            .mensaje {
                max-width: 95%;
            }
        }

        body.modo-claro {
            background-color: rgb(30, 25, 35);
            color: rgba(255, 255, 255, 0.85);
        }

        body.modo-claro .tarjeta1,
        body.modo-claro .tarjeta2,
        body.modo-claro .tarjeta3,
        body.modo-claro .tarjeta4 {
            background: rgba(50, 45, 55, 0.6);
            backdrop-filter: blur(10px);
            border: 1.6px solid rgba(200, 180, 200, 0.3);
            color: rgba(255, 255, 255, 0.85);
        }

        body.modo-claro hr {
            border-color: rgba(200, 180, 200, 0.3);
        }

        body.modo-claro .btn-config {
            color: rgba(255, 255, 255, 0.85);
            border-color: rgba(200, 180, 200, 0.3);
        }

        body.modo-claro .btn-config:hover {
            background: rgb(80, 70, 90) !important;
        }

        body.modo-claro h3 span {
            color: rgba(200, 180, 200, 0.7) !important;
        }

        body.modo-claro .tarjeta-pequena:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        body.modo-claro .mensaje-usuario {
            background: rgba(120, 90, 160, 0.7);
        }

        body.modo-claro .mensaje-ia {
            background: rgba(70, 55, 85, 0.7);
        }

        body.modo-claro .input-mensaje {
            background: rgba(255, 255, 255, 0.15);
            color: white;
        }
    </style>
</head>
<body>

    <div class="contenedor-boton">
        <button class="btn-config" onclick="location.href='index.html'">
            <b>Volver</b>
        </button>
    </div>

    <div class="tarjeta1">
        <h2 style="margin: 0;">Kecomu · Chat</h2>
        <hr>
        <p style="font-size: 11px; margin: 0;">Interactúa con la inteligencia artificial</p>
    </div>

    <div class="fila">
        <div class="tarjeta-grande tarjeta3 chat-container">
            <div class="selector-version">
                <button class="btn-version" data-version="Nova" onclick="cambiarVersion('Nova')">Nova</button>
                <button class="btn-version" data-version="Kero" onclick="cambiarVersion('Kero')">Kero</button>
                <button class="btn-version" data-version="Umwarimu" onclick="cambiarVersion('Umwarimu')">Umwarimu</button>
            </div>
            <div class="mensajes-area" id="mensajesArea">
                <div class="mensaje mensaje-ia">
                    Hola, soy Kecomu. ¿En qué puedo ayudarte con desarrollo web?
                </div>
            </div>
            <div class="input-area">
                <textarea class="input-mensaje" id="inputMensaje" rows="2" placeholder="Escribe tu mensaje..."></textarea>
                <button class="btn-enviar" onclick="enviarMensaje()">Enviar</button>
            </div>
        </div>
    </div>

    <div class="contenedor-boton-izq">
        <button class="btn-config" onclick="location.href='index.html'" style="margin-top: 10px;">
            <b>← Volver al inicio</b>
        </button>
    </div>

    <script>
        let versionActual = 'Nova';

        function getCookie(nombre) {
            const value = `; ${document.cookie}`;
            const parts = value.split(`; ${nombre}=`);
            if (parts.length === 2) return parts.pop().split(';').shift();
            return null;
        }

        function setCookie(nombre, valor) {
            document.cookie = `${nombre}=${valor}; path=/; max-age=31536000`;
        }

        function cambiarVersion(version) {
            versionActual = version;
            setCookie('kecomu_version', version);
            document.querySelectorAll('.btn-version').forEach(btn => {
                if (btn.getAttribute('data-version') === version) {
                    btn.classList.add('activo');
                } else {
                    btn.classList.remove('activo');
                }
            });
            agregarMensajeSistema(`Has cambiado a la versión ${version}`);
        }

        function agregarMensaje(texto, tipo) {
            const area = document.getElementById('mensajesArea');
            const div = document.createElement('div');
            div.className = `mensaje mensaje-${tipo}`;
            div.textContent = texto;
            area.appendChild(div);
            area.scrollTop = area.scrollHeight;
        }

        function agregarMensajeSistema(texto) {
            const area = document.getElementById('mensajesArea');
            const div = document.createElement('div');
            div.className = 'mensaje mensaje-ia';
            div.style.opacity = '0.7';
            div.style.fontSize = '11px';
            div.textContent = texto;
            area.appendChild(div);
            area.scrollTop = area.scrollHeight;
        }

        function obtenerRespuestaSimulada(mensaje, version) {
            const msg = mensaje.toLowerCase();
            
            if (version === 'Nova') {
                if (msg.includes('html') || msg.includes('css') || msg.includes('javascript')) {
                    return `[Nova]\n\nAquí tienes una estructura optimizada:\n\n<!DOCTYPE html>\n<html>\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Documento Optimizado</title>\n    <style>\n        * { margin: 0; padding: 0; box-sizing: border-box; }\n        body { font-family: system-ui; min-height: 100vh; display: flex; align-items: center; justify-content: center; }\n    </style>\n</head>\n<body>\n    <h1>Estructura Optimizada</h1>\n</body>\n</html>\n\nEste código sigue las mejores prácticas de rendimiento y estructura semántica.`;
                }
                return `[Nova]\n\nEntiendo tu consulta sobre "${mensaje}". Desde Nova, mi enfoque es generar código limpio, eficiente y altamente optimizado. Dame más detalles sobre lo que necesitas construir y te entregaré una solución estructurada con buenas prácticas.`;
            }
            
            if (version === 'Kero') {
                if (msg.includes('diseño') || msg.includes('bonito') || msg.includes('animación')) {
                    return `[Kero]\n\nHe preparado una animación fluida para ti:\n\n@keyframes entradaSuave {\n    0% {\n        opacity: 0;\n        transform: translateY(30px) scale(0.95);\n    }\n    100% {\n        opacity: 1;\n        transform: translateY(0) scale(1);\n    }\n}\n\n.elemento {\n    animation: entradaSuave 0.8s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards;\n}\n\n¿Quieres que ajuste la curva de animación o agregue más efectos visuales?`;
                }
                return `[Kero]\n\nVeo que preguntas sobre "${mensaje}". Desde Kero, me enfoco en crear interfaces visualmente atractivas con animaciones cuidadas y armonía cromática. Cuéntame qué estilo visual buscas y te ayudaré a darle vida.`;
            }
            
            if (version === 'Umwarimu') {
                if (msg.includes('aprender') || msg.includes('principiante') || msg.includes('explica')) {
                    return `[Umwarimu]\n\nVamos paso a paso. Te explico:\n\n1. HTML es la estructura de tu página web, como los huesos de un cuerpo.\n2. CSS es el estilo, como la ropa y los colores.\n3. JavaScript es la interacción, como los movimientos y acciones.\n\n¿Quieres que profundicemos en alguno de estos temas? No hay preguntas tontas, estoy aquí para que aprendas a tu ritmo.`;
                }
                return `[Umwarimu]\n\nSobre "${mensaje}", te explico con paciencia. ¿Qué parte te genera más dudas? Podemos revisarlo juntos y practicar con ejemplos simples hasta que lo entiendas completamente.`;
            }
            
            return `[Kecomu · ${version}]\n\nRecibí tu mensaje: "${mensaje}". ¿Puedes darme más contexto sobre lo que necesitas? Estoy aquí para ayudarte con desarrollo web.`;
        }

        async function enviarMensaje() {
            const input = document.getElementById('inputMensaje');
            const mensaje = input.value.trim();
            
            if (mensaje === '') return;
            
            agregarMensaje(mensaje, 'usuario');
            input.value = '';
            
            const respuesta = obtenerRespuestaSimulada(mensaje, versionActual);
            
            setTimeout(() => {
                agregarMensaje(respuesta, 'ia');
            }, 300);
        }

        function aplicarCalidadAnimacion() {
            const animacion = getCookie('kecomu_animacion');
            const estiloExistente = document.getElementById('estilo-animacion');
            if (estiloExistente) estiloExistente.remove();
            
            const style = document.createElement('style');
            style.id = 'estilo-animacion';
            
            if (animacion === 'baja') {
                style.textContent = `
                    @keyframes TarjetaAnimadaBaja {
                        0% { opacity: 0; }
                        100% {
                            opacity: 0.5;
                            background: rgba(255, 255, 255, 0.05);
                            backdrop-filter: blur(10px);
                            border: 1.6px solid rgba(255, 200, 200, 0.3);
                        }
                    }
                    
                    body.modo-claro @keyframes TarjetaAnimadaBaja {
                        0% { opacity: 0; }
                        100% {
                            opacity: 0.85;
                            background: rgba(50, 45, 55, 0.6);
                            backdrop-filter: blur(10px);
                            border: 1.6px solid rgba(200, 180, 200, 0.3);
                        }
                    }
                    
                    .tarjeta1, .tarjeta2, .tarjeta3, .tarjeta4, .btn-config {
                        animation: TarjetaAnimadaBaja 0.6s ease-out forwards !important;
                        animation-fill-mode: both !important;
                        filter: none !important;
                        transform: none !important;
                    }
                    
                    .mensaje-usuario, .mensaje-ia {
                        animation: ptBaja 0.5s ease-out forwards !important;
                    }
                    
                    .f2-1 { animation-delay: 0s !important; }
                    .f2-2 { animation-delay: 0.1s !important; }
                    .f2-3 { animation-delay: 0.2s !important; }
                    .f3-1 { animation-delay: 0.3s !important; }
                    .f3-2 { animation-delay: 0.3s !important; }
                    .f3-3 { animation-delay: 0.3s !important; }
                    .btn-config { animation-delay: 0.4s !important; }
                `;
            } 
            else if (animacion === 'intermedia') {
                style.textContent = `
                    @keyframes TarjetaAnimadaIntermedia {
                        0% { opacity: 0; transform: translateY(30px); }
                        100% {
                            opacity: 0.5;
                            transform: translateY(0);
                            background: rgba(255, 255, 255, 0.05);
                            backdrop-filter: blur(10px);
                            border: 1.6px solid rgba(255, 200, 200, 0.3);
                        }
                    }
                    
                    body.modo-claro @keyframes TarjetaAnimadaIntermedia {
                        0% { opacity: 0; transform: translateY(30px); }
                        100% {
                            opacity: 0.85;
                            transform: translateY(0);
                            background: rgba(50, 45, 55, 0.6);
                            backdrop-filter: blur(10px);
                            border: 1.6px solid rgba(200, 180, 200, 0.3);
                        }
                    }
                    
                    .tarjeta1, .tarjeta2, .tarjeta3, .tarjeta4, .btn-config {
                        animation: TarjetaAnimadaIntermedia 1.5s ease-in-out forwards !important;
                        animation-fill-mode: both !important;
                        filter: none !important;
                    }
                    
                    .mensaje-usuario, .mensaje-ia {
                        animation: ptIntermedia 0.7s ease-out forwards !important;
                    }
                    
                    .f2-1 { animation-delay: 0s !important; }
                    .f2-2 { animation-delay: 0.3s !important; }
                    .f2-3 { animation-delay: 0.6s !important; }
                    .f3-1 { animation-delay: 1s !important; }
                    .f3-2 { animation-delay: 1s !important; }
                    .f3-3 { animation-delay: 1s !important; }
                    .btn-config { animation-delay: 0.5s !important; }
                `;
            }
            else if (animacion === 'alta') {
                style.textContent = `
                    .tarjeta1, .tarjeta2, .tarjeta3, .tarjeta4, .btn-config {
                        animation: TarjetaAnimada 1.5s ease-in-out forwards !important;
                        animation-fill-mode: both !important;
                    }
                    
                    .mensaje-usuario {
                        animation: pt 0.8s ease-out forwards !important;
                    }
                    
                    .mensaje-ia {
                        animation: pt 1.3s ease-out forwards !important;
                        animation-delay: 0.8s !important;
                    }
                    
                    .f2-1 { animation-delay: 0s !important; }
                    .f2-2 { animation-delay: 0.3s !important; }
                    .f2-3 { animation-delay: 0.6s !important; }
                    .f3-1 { animation-delay: 1s !important; }
                    .f3-2 { animation-delay: 1s !important; }
                    .f3-3 { animation-delay: 1s !important; }
                    .btn-config { animation-delay: 0.5s !important; }
                `;
            }
            
            if (animacion !== null) {
                document.head.appendChild(style);
            }
        }

        function aplicarClaridadVisual() {
            const claridad = getCookie('kecomu_claridad');
            const estiloExistente = document.getElementById('estilo-claridad');
            if (estiloExistente) estiloExistente.remove();
            
            if (claridad === 'true') {
                const style = document.createElement('style');
                style.id = 'estilo-claridad';
                style.textContent = `
                    .tarjeta1, .tarjeta2, .tarjeta3, .tarjeta4, .btn-config, .mensaje, .input-mensaje, .btn-enviar, .btn-version {
                        filter: none !important;
                        backdrop-filter: none !important;
                    }
                    
                    .tarjeta1, .tarjeta2, .tarjeta3, .tarjeta4 {
                        opacity: 1 !important;
                        background: rgba(20, 15, 25, 0.95) !important;
                        border: 2px solid rgba(255, 255, 255, 0.3) !important;
                    }
                    
                    body.modo-claro .tarjeta1,
                    body.modo-claro .tarjeta2,
                    body.modo-claro .tarjeta3,
                    body.modo-claro .tarjeta4 {
                        background: rgba(245, 240, 250, 0.98) !important;
                        border: 2px solid rgba(100, 70, 120, 0.5) !important;
                        color: #1a1a2e !important;
                    }
                    
                    body {
                        font-size: 18px !important;
                    }
                    
                    .tarjeta-pequena h3, .tarjeta-grande h3 {
                        font-size: 1.3rem !important;
                        font-weight: 600 !important;
                    }
                    
                    .tarjeta-grande p, .tarjeta1 p {
                        font-size: 1rem !important;
                        line-height: 1.5 !important;
                    }
                    
                    .btn-config {
                        opacity: 0.9 !important;
                        filter: none !important;
                        backdrop-filter: none !important;
                        background: rgba(0, 0, 0, 0.7) !important;
                        font-size: 12px !important;
                        padding: 10px 24px !important;
                    }
                `;
                document.head.appendChild(style);
            }
        }

        function aplicarPreferencias() {
            const tema = getCookie('kecomu_tema');
            const version = getCookie('kecomu_version');
            
            if (tema === 'claro') {
                document.body.classList.add('modo-claro');
            }
            
            if (version) {
                versionActual = version;
                document.querySelectorAll('.btn-version').forEach(btn => {
                    if (btn.getAttribute('data-version') === version) {
                        btn.classList.add('activo');
                    }
                });
            }
            
            aplicarCalidadAnimacion();
            aplicarClaridadVisual();
        }

        document.getElementById('inputMensaje').addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                enviarMensaje();
            }
        });

        aplicarPreferencias();
    </script>

</body>
</html>
